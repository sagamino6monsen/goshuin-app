<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>御朱印コレクション</title>
  <link rel="icon" type="image/png" href="icon.png">
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <header>
    <h1>⛩️ 御朱印コレクション</h1>
    <nav>
      <button class="tab-btn active" onclick="showTab('list', event)">📋 一覧</button>
      <button class="tab-btn" onclick="showTab('map', event)">🗺️ 地図</button>
      <button class="tab-btn" onclick="showTab('form', event)">➕ 登録</button>
    </nav>
  </header>

  <main>
    <!-- 一覧タブ -->
    <section id="tab-list">
      <div class="list-header">
        <h2>いただいた御朱印一覧 <span id="count">0</span>件</h2>
        <input type="text" id="search-input" placeholder="🔍 神社・お寺の名前で検索" oninput="renderList()">
        <div class="sort-buttons">
          <span>並び替え：</span>
          <button class="sort-btn active" onclick="sortList('date-desc', event)">新しい順</button>
          <button class="sort-btn" onclick="sortList('date-asc', event)">古い順</button>
          <button class="sort-btn" onclick="sortList('name', event)">名前順</button>
          <button class="sort-btn" onclick="sortList('location', event)">地域順</button>
        </div>
        <div class="import-area">
          <button type="button" id="import-btn">📥 一括インポート</button>
          <input type="file" id="import-file" accept=".json" style="display:none">
        </div>
      </div>
      <div id="goshuin-list"></div>
    </section>

    <!-- 地図タブ -->
    <section id="tab-map" class="hidden">
      <h2>🗺️ 参拝マップ</h2>
      <div id="map"></div>
    </section>

    <!-- 登録タブ -->
    <section id="tab-form" class="hidden">
      <h2>新しい御朱印を登録</h2>
      <form id="goshuin-form">
        <label>神社・お寺の名前 *
          <input type="text" id="shrine-name" placeholder="例：明治神宮" required>
        </label>
        <label>いただいた日付 *
          <input type="date" id="visit-date" required>
        </label>
        <label>都道府県
          <input type="text" id="location" placeholder="例：東京都">
        </label>
        <label>市区町村
          <input type="text" id="city" placeholder="例：渋谷区">
        </label>
        <label>場所を地図に登録</label>
        <div class="location-options">
          <input type="text" id="address-input" placeholder="神社名や住所を入力（例：明治神宮）">
          <button type="button" id="geocode-btn">🔍 検索</button>
        </div>
        <button type="button" id="get-location-btn">📍 現在地を取得する</button>
        <span id="location-status"></span>
        <div id="register-map-preview" class="map-preview hidden"></div>
        <label>写真（最大3枚） <span id="photo-count-msg" class="count-msg"></span></label>
        <div class="photo-buttons">
          <button type="button" id="camera-btn">📷 カメラで撮影</button>
          <button type="button" id="gallery-btn">🖼️ ギャラリーから選ぶ</button>
        </div>
        <input type="file" id="photo" accept="image/*" style="display:none">
        <input type="file" id="photo-camera" accept="image/*" capture="environment" style="display:none">
        <div id="photo-preview" class="photo-grid"></div>
        <label>メモ
          <textarea id="memo" placeholder="例：初詣で訪問"></textarea>
        </label>
        <button type="submit">登録する</button>
      </form>
    </section>

    <!-- 編集モーダル -->
    <div id="edit-modal" class="modal-overlay hidden">
      <div class="modal-content">
        <h2>✏️ 御朱印を編集</h2>
        <form id="edit-form">
          <label>神社・お寺の名前
            <input type="text" id="edit-shrine-name" required>
          </label>
          <label>いただいた日付
            <input type="date" id="edit-visit-date" required>
          </label>
          <label>都道府県
            <input type="text" id="edit-location">
          </label>
          <label>市区町村
            <input type="text" id="edit-city">
          </label>
          <label>場所を地図に登録</label>
          <div class="location-options">
            <input type="text" id="edit-address-input" placeholder="神社名や住所を入力">
            <button type="button" id="edit-geocode-btn">🔍 検索</button>
          </div>
          <button type="button" id="edit-get-location-btn">📍 現在地を取得する</button>
          <span id="edit-location-status"></span>
          <div id="edit-map-preview" class="map-preview hidden"></div>
          <label>メモ
            <textarea id="edit-memo"></textarea>
          </label>
          <label>写真（最大3枚） <span id="edit-photo-count-msg" class="count-msg"></span></label>
          <div class="photo-buttons">
            <button type="button" id="edit-camera-btn">📷 カメラで撮影</button>
            <button type="button" id="edit-gallery-btn">🖼️ ギャラリーから選ぶ</button>
          </div>
          <input type="file" id="edit-photo" accept="image/*" style="display:none">
          <input type="file" id="edit-photo-camera" accept="image/*" capture="environment" style="display:none">
          <div id="edit-photo-preview" class="photo-grid"></div>
          <div class="modal-buttons">
            <button type="button" id="edit-cancel-btn">キャンセル</button>
            <button type="submit">保存する</button>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
